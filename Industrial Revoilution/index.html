<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrial Revolution: Reborn</title>
<link rel="icon" href="icon.png" type="image/png">
<style>
    body {
        overflow-y: hidden;
        background-color: #121212;
        color: #e0e0e0;
        font-family: "Consolas", monospace;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        height: 100vh;
        box-sizing: border-box;
    }
    #gameContainer {
        display: flex;
        gap: 30px;
        width: 100%;
        max-width: 1200px;
        justify-content: flex-start;
    }
    #mineArea {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }
    #mine {
        border: 2px solid #444;
        background-color: #1a1a1a;
        color: #ecf0f1;
        border-radius: 4px;
        font-family: "Consolas", monospace;
        font-size: x-large;
        height: 500px;
        width: 500px;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
    }
    #mine:hover {
        background-color: #212121;;
    }
    #mine:active {
        transform: scale(0.98);
    }
    #progressContainer {
        width: 500px;
        border: 2px solid #444;
        border-radius: 4px;
        margin-top: 15px;        
        background-color: #1a1a1a;
        height: 30px;
        overflow: hidden;
    }
    #progressBar {
        width: 0;
        height: 100%;
        background-color: #ffffff;
        transition: width 0.04s linear;
        border-radius: 2px;
    }
    #craft {
        background-color: #1e1e1e;
        width: 500px;
        height: 500px;
        border: 2px solid #444;
        font-family: "Consolas", monospace;
        font-size: large;
        text-align: left;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding: 20px;
        box-sizing: border-box;
        border-radius: 4px;
    }
    #craft h3 {
        margin-top: 0;
        border-bottom: 1px solid #444;
        padding-bottom: 10px;
        width: 100%;
    }
    #inputContainer {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
        align-items: flex-start;
    }
    #textBox {
        font-size: 16px;
        border: 1px solid #555;
        background-color: #1a1a1a;
        color: white;
        padding: 8px;
        height: 40px;
        font-family: "Consolas", monospace;
        width: 100%;
        box-sizing: border-box;
        border-radius: 2px;
    }
    #textBox:focus {
        outline: none;
    }
    #craftButton, #craftDoButton {
        border: 1px solid #555;
        background-color: #1a1a1a;
        color: #fff;
        border-radius: 2px;
        height: 40px;
        font-family: "Consolas", monospace;       
        cursor: pointer;
        width: 100%;
        font-weight: bold;
        transition: background-color 0.2s;
    }
    #craftButton:hover, #craftDoButton:hover {
        background-color: #444;
        border-color: #777;
    }
    #craftNeed {
        list-style: none;
        padding: 10px;
        margin: 10px 0;
        max-height: 150px;
        overflow-y: auto;
        text-align: left;
        width: 100%;
        background-color: #1a1a1a;
        border: 1px solid #333;
        box-sizing: border-box;
    }
    #craftNeed li {
        display: block;
        margin: 5px 0;
        border-bottom: 1px solid #222;
        padding-bottom: 2px;
    }
    ::-webkit-scrollbar {
        width: 8px;
    }
    ::-webkit-scrollbar-track {
        background: #1a1a1a; 
    }
    ::-webkit-scrollbar-thumb {
        background: #444; 
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #555; 
    }
    #inventoryContainer {
        width: 100%;
        max-width: 1200px;
        margin-top: 30px;
    }
    #inventory {
        width: 100%;
        height: 300px;
        overflow-y: scroll;
        border: 2px solid #444;
        background-color: #1a1a1a;
        border-radius: 4px;
    }
    #inventory ul {
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        grid-auto-rows: 1fr;
        gap: 4px;
        width: 100%;
        height: 100%;
        list-style: none;
        padding: 10px;
        margin: 0;
        box-sizing: border-box;
    }
    #inventory ul li {
        border: 1px solid #333;
        padding: 5px;
        font-size: 15px;        
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #252525;
        color: #aaa;
        font-family: "Consolas", monospace;
        word-break: break-word;
        transition: background-color 0.2s;
    }
    #inventory ul li:hover {
        background-color: #2c2c2c;
        border-color: #555;
    }
</style>
</head>
<body>

<div id="gameContainer">
    <div id="mineArea">
        <button id="mine" onclick="mine()">Mine</button>
        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>
    </div>

    <div id="craft">
        <h3>Craft</h3>
        <div id="inputContainer">
            <input type="text" id="textBox" placeholder="Craft ID">
            <button id="craftButton" onclick="findCraftID()">Find Craft</button>
            <ul id="craftNeed"></ul>
            <button id="craftDoButton" onclick="craft()" style="visibility: hidden;">Craft</button>
        </div>
    </div>
</div>

<div id="inventoryContainer">
    <div id="inventory">
        <ul id="list"></ul>
    </div>
</div>

<script>
let isMining = false;
let inventory = [];
const itemsID = ["Stick", "Oak Log", "Flint"];
const craftID = {
    1: {
        need: ["Oak Log", 0, "Stick", 0],
        output: ["Oak Planks", 1, "TetraHydroPiranyaRibaEshkereIHatefdsfsdfsdfdsf", 64, "sigma", 2]
    }
};
const amountToGive = 1;
const miningTime = 1000;
const MAX_STACK = 64;
const INVENTORY_SIZE = 36;

function init() {
    inventorySetup();
    addInventoryUI();
}

function inventorySetup() {
    for (let i = 0; i < INVENTORY_SIZE; i++) {
        inventory.push("Empty");
    }
}

function addInventoryUI() {
    const inventoryHTML = document.getElementById("list");
    inventoryHTML.innerHTML = "";
    for (let i = 0; i < INVENTORY_SIZE; i++) {
        const li = document.createElement("li");
        li.setAttribute("id", "slot-" + i);
        updateSlotUI(i);
        inventoryHTML.appendChild(li);
    }
}

function updateSlotUI(index) {
    const slot = document.getElementById("slot-" + index);
    if (!slot) return;
    
    const item = inventory[index];
    if (item === "Empty") {
        slot.innerHTML = "Empty";
    } else {
        slot.innerHTML = `${item.name} ${item.amount}x`;
    }
}

function getItemSearch() {
    return itemsID[Math.floor(Math.random() * itemsID.length)];
}

function addToInventory(itemName, amount) {
    let remaining = amount;

    for (let i = 0; i < inventory.length && remaining > 0; i++) {
        const slot = inventory[i];
        if (slot !== "Empty" && slot.name === itemName && slot.amount < MAX_STACK) {
            const spaceLeft = MAX_STACK - slot.amount;
            const toAdd = Math.min(spaceLeft, remaining);
            slot.amount += toAdd;
            remaining -= toAdd;            
            updateSlotUI(i);
        }
    }

    for (let i = 0; i < inventory.length && remaining > 0; i++) {
        if (inventory[i] === "Empty") {
            const toAdd = Math.min(MAX_STACK, remaining);
            inventory[i] = { name: itemName, amount: toAdd };
            remaining -= toAdd;
            updateSlotUI(i);
        }
    }

    return remaining === 0;
}

function removeFromInventory(itemName, amount) {
    let needed = amount;
    for (let i = 0; i < inventory.length && needed > 0; i++) {
        const slot = inventory[i];
        if (slot !== "Empty" && slot.name === itemName) {
            const toRemove = Math.min(slot.amount, needed);
            slot.amount -= toRemove;
            needed -= toRemove;
            if (slot.amount === 0) {
                inventory[i] = "Empty";
            }
            updateSlotUI(i);
        }
    }
    return needed === 0;
}

function mine() {
    if (isMining) return;
    isMining = true;
    startBar(miningTime);
    
    setTimeout(() => {
        isMining = false;
        const newItem = getItemSearch();
        const remaining = Math.floor(Math.random() * 2) + amountToGive;
        
        const success = addToInventory(newItem, remaining);
        if (!success) {
            console.log("Inventory full, some items lost");
        }
    }, miningTime);
}
function startBar(time) {
    const progressBar = document.getElementById("progressBar");
    progressBar.style.width = '0%';
    let startTime = null;

    function animateProgress(timestamp) {
        if (!startTime) startTime = timestamp;
        const elapsed = timestamp - startTime;
        const width = Math.min((elapsed / time) * 100, 100);
        progressBar.style.width = width + '%';
        
        if (elapsed < time) {
            requestAnimationFrame(animateProgress);
        } else {
            progressBar.style.width = '0%';
        }
    }
    requestAnimationFrame(animateProgress);
}

function findCraftID() {
    const inputValue = document.getElementById("textBox").value;
    const craftHTML = document.getElementById("craftNeed");
    const craftBtn = document.getElementById("craftDoButton");
    
    craftHTML.innerHTML = "";
    craftBtn.style.visibility = "hidden";

    if (craftID[inputValue]) {
        const ingredients = craftID[inputValue]["need"];
        const output = craftID[inputValue]["output"];
        craftBtn.style.visibility = "visible";

        for (let i = 0; i < ingredients.length; i += 2) {
            const li = document.createElement("li");
            li.innerHTML = `${ingredients[i]} x${ingredients[i + 1]}`;
            craftHTML.appendChild(li);
        }

        for (let i = 0; i < output.length; i += 2) {
            const outputLi = document.createElement("li");
            outputLi.style.fontWeight = "bold";
            outputLi.innerHTML = `Output: ${output[i]} x${output[i + 1]}`;
            craftHTML.appendChild(outputLi);
        }
    } else {
        const li = document.createElement("li");
        li.innerHTML = "Invalid Craft ID";
        craftHTML.appendChild(li);
    }}

function craft() {
    const inputValue = document.getElementById("textBox").value;
    const recipe = craftID[inputValue];

    if (!recipe) {
        alert("Invalid Craft ID");
        return;
    }

    const ingredients = recipe.need;
    const outputItems = recipe.output;
    for (let i = 0; i < ingredients.length; i += 2) {
        const itemName = ingredients[i];
        const neededAmount = ingredients[i + 1];
        let totalAmount = 0;

        for (let j = 0; j < inventory.length; j++) {
            if (inventory[j] !== "Empty" && inventory[j].name === itemName) {
                totalAmount += inventory[j].amount;
            }
        }

        if (totalAmount < neededAmount) {
            alert("Not enough resources for crafting!");
            return; 
        }
    }
    
    function checkSpace(itemName, amount) {
        let remaining = amount;
        let tempInventory = JSON.parse(JSON.stringify(inventory));
        let neededCheck = 0;
         for (let i = 0; i < ingredients.length; i += 2) {
             let name = ingredients[i];
             let amt = ingredients[i+1];
             let toRemove = amt;
             for(let k=0; k<tempInventory.length && toRemove > 0; k++){
                 if(tempInventory[k] !== "Empty" && tempInventory[k].name === name){
                     if(tempInventory[k].amount >= toRemove){
                         tempInventory[k].amount -= toRemove;
                         toRemove = 0;
                     } else {
                         toRemove -= tempInventory[k].amount;
                         tempInventory[k].amount = 0;
                         tempInventory[k] = "Empty";
                     }
                 }
             }
         }
         let canFit = true;
         for (let i = 0; i < outputItems.length; i += 2) {
             let outName = outputItems[i];
             let outAmt = outputItems[i+1];
             
             let rem = outAmt;
             for(let k=0; k<tempInventory.length && rem > 0; k++){
                 if(tempInventory[k] !== "Empty" && tempInventory[k].name === outName && tempInventory[k].amount < MAX_STACK){
                     let space = MAX_STACK - tempInventory[k].amount;
                     let add = Math.min(space, rem);
                     tempInventory[k].amount += add;
                     rem -= add;
                 }
             }
             for(let k=0; k<tempInventory.length && rem > 0; k++){
                 if(tempInventory[k] === "Empty"){
                     let add = Math.min(MAX_STACK, rem);
                     tempInventory[k] = { name: outName, amount: add };
                     rem -= add;
                 }
             }
             
             if(rem > 0) {
                 canFit = false;
                 break;
             }
         }
         
         if(!canFit) {
             alert("Not enough space in inventory for output!");
             return;
         }
    }
    
    checkSpace(); 
    for (let i = 0; i < ingredients.length; i += 2) {
        const itemName = ingredients[i];
        const neededAmount = ingredients[i + 1];
        removeFromInventory(itemName, neededAmount);
    }

    for (let i = 0; i < outputItems.length; i += 2) {
        const itemName = outputItems[i];
        const outputAmount = outputItems[i + 1];
        addToInventory(itemName, outputAmount);
    }
}

init();
</script></body>
</html>
