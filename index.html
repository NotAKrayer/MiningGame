<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Voxel Structure</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }
    </style>
</head>
<body>
<script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202020);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 6, 6); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = false; //ТЕНИ
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        //dirLight.castShadow = true; TOJE TENI
        scene.add(dirLight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(1, 1, 1);
        
        const textureLoader = new THREE.TextureLoader();
        const urlBlock2 = './machine_coil_cupronickel.png'; 
        const urlBlock1 = './machine_casing_frost_proof.png';

        const matA = new THREE.MeshStandardMaterial({ 
            map: textureLoader.load(urlBlock1) 
        }); 
        
        const matB = new THREE.MeshStandardMaterial({ 
            map: textureLoader.load(urlBlock2) 
        });

        const materials = {
            'a': matA,
            'b': matB,
            'x': null
        };

        const structure = [
            [
                ['a', 'a', 'a'],
                ['a', 'a', 'a'],
                ['a', 'a', 'a'] 
            ],
            [
                ['b', 'b', 'b'],
                ['x', 'b', 'x'],
                ['b', 'b', 'b']
            ] 
        ];

        const geometry = new THREE.BoxGeometry(1, 1, 1);

        for (let layer = 0; layer < structure.length; layer++) {
            for (let row = 0; row < structure[layer].length; row++) {
                for (let col = 0; col < structure[layer][row].length; col++) {
                     const char = structure[layer][row][col];
                        if (materials[char]) {
                        const cube = new THREE.Mesh(geometry, materials[char]);
                        cube.position.set(col, layer, row);
                        //cube.castShadow = true;
                        //cube.receiveShadow = true; teni
                        //const edges = new THREE.EdgesGeometry(geometry);
                        //const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
                        cube.add(line);
                        scene.add(cube);
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
